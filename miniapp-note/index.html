<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Новая заметка</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #ffffff;
      color: #111111;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    select,
    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #cccccc;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
      color: #111;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    .multi {
      min-height: 120px;
    }

    .hint {
      font-size: 13px;
      color: #666666;
      margin-top: 4px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #111111;
      color: #ffffff;
    }

    button:hover {
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Новая заметка</h1>

    <div class="field">
      <label for="type">Тип</label>
      <select id="type">
        <option value="идея" selected>идея</option>
        <option value="сцена">сцена</option>
        <option value="персонаж">персонаж</option>
        <option value="лор">лор</option>
        <option value="диалог">диалог</option>
        <option value="задача">задача</option>
        <option value="вопрос">вопрос</option>
      </select>
    </div>

    <div class="field">
      <label for="status">Статус</label>
      <select id="status">
        <option value="новое">новое</option>
        <option value="разобрано">разобрано</option>
        <option value="в работу">в работу</option>
        <option value="внесено" selected>внесено</option>
        <option value="отложено">отложено</option>
        <option value="отброшено">отброшено</option>
      </select>
    </div>

    <div class="field">
      <label for="block">Блок</label>
      <select id="block">
        <option value="">— не выбран —</option>
        <option value="Лор">Лор</option>
        <option value="Политика">Политика</option>
        <option value="Сцены">Сцены</option>
      </select>
      <div class="hint">Пока это тестовый список.</div>
    </div>

    <div class="field">
      <label for="newBlock">Новый блок</label>
      <input id="newBlock" type="text" placeholder="Если нужного блока нет — впиши новый" />
    </div>

    <div class="field">
      <label for="focuses">Фокус</label>
      <select id="focuses" class="multi" multiple>
        <option value="Лор: Империя">Лор: Империя</option>
        <option value="Лор: Культ">Лор: Культ</option>
        <option value="Политика: Толпа">Политика: Толпа</option>
      </select>
      <div class="hint">Можно выбрать несколько.</div>
    </div>

    <div class="field">
      <label for="newFocuses">Новые фокусы</label>
      <input id="newFocuses" type="text" placeholder="Через запятую, если нужных нет" />
    </div>

    <div class="field">
      <label for="characters">Персонажи</label>
      <select id="characters" class="multi" multiple>
        <option value="Клод">Клод</option>
        <option value="Невеста">Невеста</option>
        <option value="Наемница">Наемница</option>
      </select>
      <div class="hint">Можно выбрать несколько.</div>
    </div>

    <div class="field">
      <label for="newCharacters">Новые персонажи</label>
      <input id="newCharacters" type="text" placeholder="Через запятую, если нужных нет" />
    </div>

    <div class="field">
      <label for="bodyText">Текст заметки</label>
      <textarea id="bodyText" placeholder="Напиши заметку здесь"></textarea>
    </div>

    <div class="field">
      <button id="sendBtn" type="button">Отправить в бот</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp
    tg.ready()
    tg.expand()

    function getMultiValues(selectEl) {
      return Array.from(selectEl.selectedOptions)
        .map(option => option.value)
        .filter(Boolean)
    }

    function splitCommaList(value) {
      return String(value || '')
        .split(',')
        .map(item => item.trim())
        .filter(Boolean)
    }

    function uniqueClean(list) {
      return [...new Set(
        list
          .map(item => String(item || '').trim())
          .filter(Boolean)
      )]
    }

    function buildData() {
      const selectedFocuses = getMultiValues(document.getElementById('focuses'))
      const newFocuses = splitCommaList(document.getElementById('newFocuses').value)

      const selectedCharacters = getMultiValues(document.getElementById('characters'))
      const newCharacters = splitCommaList(document.getElementById('newCharacters').value)

      const finalBlock =
        document.getElementById('newBlock').value.trim() ||
        document.getElementById('block').value.trim()

      return {
        type: document.getElementById('type').value.trim(),
        status: document.getElementById('status').value.trim(),
        block: finalBlock,
        focuses: uniqueClean([...selectedFocuses, ...newFocuses]),
        characters: uniqueClean([...selectedCharacters, ...newCharacters]),
        bodyText: document.getElementById('bodyText').value.trim()
      }
    }

    function buildBotText(data) {
      const lines = []

      if (data.characters.length > 0) {
        lines.push(`персонажи: ${data.characters.join(', ')}`)
      }

      if (data.block) {
        lines.push(`блок: ${data.block}`)
      }

      if (data.focuses.length > 0) {
        lines.push(`фокус: ${data.focuses.join(', ')}`)
      }

      if (data.status) {
        lines.push(`статус: ${data.status}`)
      }

      lines.push(`${data.type}: ${data.bodyText}`)

      return lines.join('\n')
    }

    document.getElementById('sendBtn').addEventListener('click', () => {
      const data = buildData()

      if (!data.bodyText) {
        alert('Напиши текст заметки')
        return
      }

      const botText = buildBotText(data)

      tg.sendData(botText)
      tg.close()
    })
  </script>
</body>
</html>
